<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="card shadow calculadora">
<div class="card-header text-center bg-primary text-white">
        <h2>Calculadora</h2>
    </div>

<div class="card-body">
<input type="text" id="pantalla" class="form-control mb-3 w-100" readonly>

        <div class="row g-2">
            <div class="col-3"><button class="btn btn-secondary w-100" onclick="agregar('7')">7</button></div>
            <div class="col-3"><button class="btn btn-secondary w-100" onclick="agregarNumero('8')">8</button></div>
            <div class="col-3"><button class="btn btn-secondary w-100" onclick="agregarNumero('9')">9</button></div>
            <div class="col-3"><button class="btn btn-warning w-100" onclick="agregarNumero('/')">÷</button></div>

            <div class="col-3"><button class="btn btn-secondary w-100" onclick="agregarNumero('4')">4</button></div>
            <div class="col-3"><button class="btn btn-secondary w-100" onclick="agregarNumero('5')">5</button></div>
            <div class="col-3"><button class="btn btn-secondary w-100" onclick="agregarNumero('6')">6</button></div>
            <div class="col-3"><button class="btn btn-warning w-100" onclick="agregarNumero('*')">x</button></div>

            <div class="col-3"><button class="btn btn-secondary w-100" onclick="agregarNumero('1')">1</button></div>
            <div class="col-3"><button class="btn btn-secondary w-100" onclick="agregarNumero('2')">2</button></div>
            <div class="col-3"><button class="btn btn-secondary w-100" onclick="agregarNumero('3')">3</button></div>
            <div class="col-3"><button class="btn btn-warning w-100" onclick="agregarNumero('-')">-</button></div>

            <div class="col-3"><button class="btn btn-secondary w-100" onclick="agregarNumero('0')">0</button></div>
            <div class="col-3"><button class="btn btn-secondary w-100" onclick="agregarNumero('.')">.</button></div>
            <div class="col-3"><button class="btn btn-info w-100" onclick="calcular('=')">=</button></div>
            <div class="col-3"><button class="btn btn-warning w-100" onclick="agregarNumero('+')">+</button></div>

            <div class="col-6"><button class="btn btn-success w-100" onclick="borrarTodo()">AC</button></div>
            <div class="col-6"><button class="btn btn-success w-100" onclick="borrarUno()">←</button></div>
        </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
